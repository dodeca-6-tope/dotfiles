# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# General
set -g mouse on
set -g history-limit 50000
bind x confirm-before -y kill-pane

# Status bar
set -g window-status-current-format "#[bg=yellow] #I:#W #[default]"
set -g status-right "#{?client_prefix,#[bg=yellow] PREFIX ,} %H:%M"
